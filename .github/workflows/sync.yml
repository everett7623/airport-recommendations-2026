name: Sync from VPSKnow

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes committed)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout VPSKnow source
        uses: actions/checkout@v4
        with:
          repository: everett7623/VPS-Knowledge
          ref: main
          path: _vpsknow
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate VPSKnow Astro source
        run: |
          source_file="_vpsknow/src/pages/airport-recommendations.astro"
          test -s "$source_file"
          grep -q "airportCategories" "$source_file"
          grep -q "airports:" "$source_file"
          echo "Using $source_file ($(wc -c < "$source_file") bytes)"

      - name: Run sync
        id: sync
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/sync-from-astro.js --local _vpsknow/src/pages/airport-recommendations.astro --dry-run
          else
            node scripts/sync-from-astro.js --local _vpsknow/src/pages/airport-recommendations.astro
          fi

      - name: Validate JSON
        run: node scripts/validate-json.js

      - name: Generate READMEs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/generate-readme.js

      - name: Check for changes
        id: git_diff
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.git_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/airports.json README.md README-SIMPLE.md docs/changelog.md
          git commit -m "sync: auto-update from VPSKnow Astro source [skip ci]"
          git push
