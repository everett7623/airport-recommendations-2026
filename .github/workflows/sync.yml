name: Sync from VPSKnow

on:
  schedule:
    # Daily at 01:17 UTC (09:17 Asia/Shanghai); avoid the busy top of the hour.
    - cron: '17 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (no data will be committed)'
        type: boolean
        default: false
      source_ref:
        description: 'Optional VPSKnow branch/tag/SHA override'
        type: string
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VPSKNOW_SOURCE_REPO: ${{ secrets.VPSKNOW_SOURCE_REPO }}
      VPSKNOW_SOURCE_REF: ${{ github.event.inputs.source_ref || secrets.VPSKNOW_SOURCE_REF || 'main' }}
      VPSKNOW_ASTRO_PATH: ${{ secrets.VPSKNOW_ASTRO_PATH || 'src/pages/airport-recommendations.astro' }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check private VPSKnow sync config
        env:
          VPSKNOW_SYNC_TOKEN: ${{ secrets.VPSKNOW_SYNC_TOKEN }}
        run: |
          if [ -z "$VPSKNOW_SOURCE_REPO" ]; then
            echo "::error::Missing secret VPSKNOW_SOURCE_REPO. Set it to the private source repo, for example owner/repo."
            exit 1
          fi
          if [ -z "$VPSKNOW_SYNC_TOKEN" ]; then
            echo "::error::Missing secret VPSKNOW_SYNC_TOKEN. It must have read access to the private VPSKnow source repo."
            exit 1
          fi
          echo "Source repo: configured via secret"
          echo "Source ref: $VPSKNOW_SOURCE_REF"
          echo "Astro path: $VPSKNOW_ASTRO_PATH"

      - name: Checkout VPSKnow source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.VPSKNOW_SOURCE_REPO }}
          ref: ${{ env.VPSKNOW_SOURCE_REF }}
          path: _vpsknow
          fetch-depth: 1
          token: ${{ secrets.VPSKNOW_SYNC_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate VPSKnow Astro source
        run: |
          source_file="_vpsknow/$VPSKNOW_ASTRO_PATH"
          if [ ! -s "$source_file" ]; then
            echo "::warning::Configured Astro path not found: $source_file"
            echo "Searching VPSKnow checkout for airport-recommendations.astro..."
            source_file="$(find _vpsknow -type f -name 'airport-recommendations.astro' | head -n 1)"
          fi
          if [ -z "$source_file" ] || [ ! -s "$source_file" ]; then
            echo "::error::Could not find airport-recommendations.astro in the VPSKnow checkout."
            echo "Available Astro files:"
            find _vpsknow -type f -name '*.astro' | sort | head -n 80
            exit 1
          fi
          if ! grep -q "airportCategories" "$source_file"; then
            echo "::error::Found $source_file, but it does not contain airportCategories."
            echo "Candidate airport files:"
            grep -RIl "airportCategories\|noAffAirports\|defunctAirports" _vpsknow | sort | head -n 80
            exit 1
          fi
          test -s "$source_file"
          echo "Using $source_file ($(wc -c < "$source_file") bytes)"
          echo "VPSKNOW_RESOLVED_ASTRO=$source_file" >> "$GITHUB_ENV"

      - name: Run sync
        id: sync
        run: node scripts/sync-from-astro.js --local "$VPSKNOW_RESOLVED_ASTRO"

      - name: Validate JSON
        run: node scripts/validate-json.js

      - name: Generate derived docs
        run: node scripts/generate-readme.js

      - name: Preview dry-run diff
        if: github.event.inputs.dry_run == 'true'
        run: git diff -- data/airports.json README.md README-SIMPLE.md docs/blacklist.md

      - name: Check for changes
        id: git_diff
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.git_diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/airports.json README.md README-SIMPLE.md docs/blacklist.md
          git commit -m "sync: auto-update from VPSKnow Astro source [skip ci]"
          git push
