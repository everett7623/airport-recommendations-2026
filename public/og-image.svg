<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="180" width="8" height="200" rx="4" fill="url(#accent)"/>

  <!-- Title -->
  <text x="120" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="800" fill="white">
    机场推荐清单
  </text>
  <text x="120" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="600" fill="#94a3b8">
    免费试用 · 性价比 · 专线 · 按量计费
  </text>

  <!-- Subtitle -->
  <text x="120" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#64748b">
    2026 年精选 | 40+ 机场实测 | 每月更新 | 支持关键词搜索
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#1a1a2e" opacity="0.8"/>
  <text x="600" y="602" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#64748b" text-anchor="middle">
    github.com/everett7623/airport-recommendations-2026  ·  vpsknow.com
  </text>

  <!-- Decorative dots -->
  <circle cx="1050" cy="120" r="60" fill="#3b82f6" opacity="0.08"/>
  <circle cx="1080" cy="140" r="30" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="150" cy="480" r="40" fill="#3b82f6" opacity="0.06"/>
</svg>
